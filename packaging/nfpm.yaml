# nfpm config that produces the .deb and .rpm packages.
# Build with:  VERSION=1.0.0 PKG_ARCH=amd64 nfpm package -f packaging/nfpm.yaml -p deb -t dist/
# PKG_ARCH is a GOARCH-style value (amd64 or arm64); nfpm maps it to each
# packager's convention (rpm: x86_64 / aarch64).
# (rkdeveloptool is bundled and statically linked to libusb, so no runtime deps.)
name: rkdeveloptool-gui
arch: ${PKG_ARCH}
platform: linux
version: ${VERSION}
maintainer: gahingwoo <huhuvmb88@outlook.com>
description: |
  Cross-platform graphical front-end for Rockchip's rkdeveloptool.
  Flash firmware, manage partitions and debug Rockchip devices without the
  command line. Bundles rkdeveloptool, so nothing else needs to be installed.
homepage: https://github.com/gahingwoo/RKDevelopTool-GUI
license: GPL-2.0
section: utils
priority: optional

contents:
  # The Nuitka onefile application binary.
  - src: ./dist/rkdevtoolgui
    dst: /usr/lib/rkdeveloptool-gui/rkdevtoolgui
    file_info:
      mode: 0755
  # Bundled rkdeveloptool (found at runtime via /usr/lib/rkdeveloptool-gui).
  - src: ./dist/rkdeveloptool
    dst: /usr/lib/rkdeveloptool-gui/rkdeveloptool
    file_info:
      mode: 0755
  # Launcher on PATH.
  - src: ./packaging/launcher.sh
    dst: /usr/bin/rkdeveloptool-gui
    file_info:
      mode: 0755
  # Desktop integration.
  - src: ./packaging/rkdeveloptool-gui.desktop
    dst: /usr/share/applications/rkdeveloptool-gui.desktop
  # License / third-party notices.
  - src: ./LICENSE
    dst: /usr/share/doc/rkdeveloptool-gui/LICENSE
  - src: ./THIRD_PARTY_LICENSES.md
    dst: /usr/share/doc/rkdeveloptool-gui/THIRD_PARTY_LICENSES.md
