name: Release

# Build installable packages for macOS (arm64 DMG) and Linux (deb/rpm/AppImage
# for x86_64 and arm64) with rkdeveloptool bundled, and attach them to a GitHub
# Release on tag push. Intel (x86_64) macOS is no longer built.
on:
  push:
    # Matches both bare (5.0.0) and v-prefixed (v1.0.0) version tags.
    tags: ["[0-9]*", "v[0-9]*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-arm64:
    name: macOS (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install automake autoconf libtool pkg-config create-dmg

      - name: Build bundled rkdeveloptool
        run: bash packaging/build-rkdeveloptool.sh "$PWD/dist/rkdeveloptool"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build app bundle (Nuitka)
        run: python build_nuitka.py

      - name: Bundle rkdeveloptool into the .app
        run: |
          SRC_APP="$(ls -d dist/*.app | head -1)"
          APP="dist/RKDevelopTool-GUI.app"
          [ "$SRC_APP" = "$APP" ] || mv "$SRC_APP" "$APP"
          cp dist/rkdeveloptool "$APP/Contents/MacOS/rkdeveloptool"
          chmod +x "$APP/Contents/MacOS/rkdeveloptool"

      - name: Create DMG
        run: |
          DMG="dist/RKDevelopTool-GUI-arm64.dmg"
          create-dmg --volname "RKDevelopTool-GUI" --no-internet-enable \
            "$DMG" "dist/RKDevelopTool-GUI.app" \
          || hdiutil create -volname "RKDevelopTool-GUI" \
               -srcfolder "dist/RKDevelopTool-GUI.app" -ov -format UDZO "$DMG"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/*.dmg

  linux:
    name: Linux ${{ matrix.arch }} (deb / rpm / AppImage)
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            pkg_arch: amd64
            nfpm_arch: x86_64
            appimage_arch: x86_64
          - arch: arm64
            runner: ubuntu-22.04-arm
            pkg_arch: arm64
            nfpm_arch: arm64
            appimage_arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool \
            pkg-config curl file imagemagick desktop-file-utils libfuse2

      - name: Build bundled rkdeveloptool
        run: bash packaging/build-rkdeveloptool.sh "$PWD/dist/rkdeveloptool"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build app (Nuitka onefile)
        run: python build_nuitka.py

      - name: Normalize binary name
        run: |
          if [ -f dist/rkdevtoolgui.bin ]; then mv dist/rkdevtoolgui.bin dist/rkdevtoolgui; fi
          test -f dist/rkdevtoolgui
          chmod +x dist/rkdevtoolgui

      - name: Install nfpm
        run: |
          curl -fsSL -o /tmp/nfpm.tar.gz \
            "https://github.com/goreleaser/nfpm/releases/download/v2.41.0/nfpm_2.41.0_Linux_${{ matrix.nfpm_arch }}.tar.gz"
          sudo tar -xzf /tmp/nfpm.tar.gz -C /usr/local/bin nfpm

      - name: Package deb + rpm
        env:
          PKG_ARCH: ${{ matrix.pkg_arch }}
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          [ -n "$VERSION" ] || VERSION="0.0.0"
          nfpm package -f packaging/nfpm.yaml -p deb -t dist/
          nfpm package -f packaging/nfpm.yaml -p rpm -t dist/

      - name: Build AppImage
        env:
          APPIMAGE_ARCH: ${{ matrix.appimage_arch }}
        run: bash packaging/make-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage

  release:
    name: Publish Release
    needs: [macos-arm64, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
